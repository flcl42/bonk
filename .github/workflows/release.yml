name: release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
      - "release/*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore ./bonk.csproj
      - run: dotnet build ./bonk.csproj -c Release --no-restore

  build:
    name: build bonk-windows-x64.exe
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish Native AOT executable
        shell: pwsh
        run: >
          dotnet publish ./bonk.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishAot=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:PublishDir=publish/win-x64/
      - name: Stage release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "publish/win-x64/bonk.exe" "dist/bonk-windows-x64.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: bonk-windows-x64.exe
          path: dist/bonk-windows-x64.exe
          if-no-files-found: error
          compression-level: 0

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: ls -lh release-assets
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          prerelease: ${{ contains(github.ref_name, '-') }}
